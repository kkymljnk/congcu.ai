  <defs>
    <!-- Vòng cung trên cho CONGCU -->
    <path id="topArc" d="M192,145 A55,55 0 0,1 302,145" fill="none"/>
    
    <!-- Gradient chữ CONGCU -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF6EC7; stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00BFFF; stop-opacity:1"/>
    </linearGradient>

    <!-- Filter tạo hiệu ứng khắc 3D cho AI -->
    <filter id="engraved3d" x="-50%" y="-50%" width="200%" height="200%">
      <!-- Inner shadow -->
      <feGaussianBlur in="SourceAlpha" stdDeviation="2" result="blur"/>
      <feOffset in="blur" dx="2" dy="2" result="offsetblur"/>
      <feComposite in="SourceGraphic" in2="offsetblur" operator="arithmetic" k2="-1" k3="1" result="innerShadow"/>
      <feMerge>
        <feMergeNode in="innerShadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- CONGCU cong phía trên, font-size lớn hơn -->
  <text font-family="Montserrat, sans-serif" font-size="22" font-weight="700" fill="url(#grad)" stroke="#FFFFFF" stroke-width="1">
    <textPath href="#topArc" startOffset="50%" text-anchor="middle">
      CONGCU
    </textPath>
  </text>

  <!-- AI lớn, khắc 3D màu tím -->
  <text x="247" y="140" text-anchor="middle" dominant-baseline="middle"
        font-family="Montserrat, sans-serif" font-size="36" font-weight="800"
        fill="#9B8BF4" stroke="#FFFFFF" stroke-width="1.5"
        filter="url(#engraved3d)">
    .AI
  </text>

  <defs>
    <linearGradient id="cosmic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#7df9ff"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>

    <filter id="deepGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="flow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="transparent"/>
      <animateTransform attributeName="gradientTransform"
        type="translate"
        from="-1 0"
        to="1 0"
        dur="2s"
        repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <g transform="translate(121.5,50) scale(0.85,0.85) translate(-121.5,-52)">
    <!-- Chữ C -->
    <path d="M135 42 C125 35, 110 40, 108 52 C110 64, 125 69, 135 62"
      transform="rotate(-30 121.5 52)"
      stroke="url(#cosmic)" stroke-width="4" fill="none" stroke-linecap="round" filter="url(#deepGlow)"/>

    <!-- Energy flow -->
    <path d="M135 42 C125 35, 110 40, 108 52 C110 64, 125 69, 135 62"
      transform="rotate(-30 121.5 52)"
      stroke="url(#flow)" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>

    <!-- Dot đầu -->
    <circle cx="135" cy="42" r="2.2" transform="rotate(-30 121.5 52)" fill="#ffffff" filter="url(#deepGlow)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Dot cuối -->
    <circle cx="135" cy="62" r="2.2" transform="rotate(-30 121.5 52)" fill="#ffffff" filter="url(#deepGlow)">
      <animate attributeName="opacity" values="1;0.5;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
