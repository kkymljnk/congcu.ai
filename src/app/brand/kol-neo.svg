<!-- KOL Neo Logo -->
<svg width="240" height="64" viewBox="0 0 240 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Glow -->
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#35F2FF"></stop>
      <stop offset="1" stop-color="#B05CFF"></stop>
    </linearGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"></feGaussianBlur>
      <feMerge><feMergeNode in="b"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  <!-- Mascot head (abstract) -->
  <g filter="url(#soft)">
    <path d="M40 10c12 0 20 8 20 18s-8 18-20 18S20 38 20 28 28 10 40 10Z" fill="url(#g1)" opacity=".12"></path>
    <path d="M40 14c9 0 15 6 15 14s-6 14-15 14-15-6-15-14 6-14 15-14Z" fill="#0B0F14"></path>
    <!-- visor -->
    <rect x="28" y="20" width="24" height="16" rx="8" fill="#0E1630" stroke="url(#g1)"></rect>
    <circle cx="36" cy="28" r="3.2" fill="#1DE9FF"></circle>
    <circle cx="44" cy="28" r="3.2" fill="#7B5CFF"></circle>
  </g>

  <!-- Wordmark (Oswald) -->
  <g transform="translate(84,15)">
    <text x="0" y="32" fill="white" font-size="30" font-family="Oswald, sans-serif" letter-spacing="1.5">
      KOL
    </text>
    <!-- underline accent -->
    <rect x="0" y="38" width="70" height="2" rx="1" fill="url(#g1)"></rect>
  </g>
</svg>
